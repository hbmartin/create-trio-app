name: release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Require main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Run releases from the main branch."
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.30.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit:prod

      - run: pnpm check

      - run: pnpm pack:dry-run

      - name: Verify package version is unpublished
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "::error::$PACKAGE_NAME@$PACKAGE_VERSION is already published."
            exit 1
          fi
          echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          ACCESS_ARGS=()
          if [[ "$PACKAGE_NAME" == @*/* ]]; then
            ACCESS_ARGS=(--access public)
          fi
          npm publish --provenance --tag "$NPM_TAG" "${ACCESS_ARGS[@]}"
